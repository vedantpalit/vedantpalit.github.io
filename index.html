<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Vedant Palit</title>
    <meta name="author" content="Vedant Palit">
    <meta name="description" content="Vedant Palit — research portfolio. Mechanistic interpretability of AI models.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <script>
      /* Set theme before first paint to avoid a flash of the wrong mode */
      (function () {
        var stored = localStorage.getItem("theme");
        var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <nav>
      <div class="container">
        <a href="#updates">Updates</a>
        <a href="#research">Research</a>
        <a href="#projects">Projects</a>
        <a href="#service">Service</a>
        <a href="#blogs">Blogs</a>
        <button id="theme-toggle" aria-label="Toggle light and dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </nav>

    <header class="container">
      <div class="intro">
        <div class="intro-text">
          <h1>Vedant Palit</h1>
          <div id="bio"></div>
          <div id="profile-links" class="profile-links"></div>
        </div>
        <div class="portrait">
          <a href="images/vp.jpg"><img src="images/vp_c.jpg" alt="Vedant Palit"></a>
          <div id="current" class="current" hidden></div>
          <div id="widget"></div>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="updates">
        <h2>Updates</h2>
        <div id="updates-list" class="timeline"></div>
      </section>

      <section id="research">
        <h2>Research</h2>
        <div id="papers-list" data-list></div>
      </section>

      <section id="projects">
        <h2>Projects</h2>
        <div id="projects-list" data-list></div>
      </section>

      <section id="service">
        <h2>Academic Service</h2>
        <div id="service-list" data-list></div>
      </section>

      <section id="blogs">
        <h2>Blogs</h2>
        <div id="blogs-list" data-list></div>
      </section>

      <div id="sentinel"></div>
    </main>

    <footer class="container">
      Vedant Palit
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
